<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store CRUD</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
</head>
<body class="bg-slate-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-slate-800">Fake Store CRUD</h1>
            <p class="text-slate-600 mt-2">Ejemplo con HTML + JS + Tailwind CDN + Fake Store Api</p>
        </header>
        <!-- formulario -->
        <section class="bg-white rounded-2xl shadow p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4 text-slate-800"> Formulario de producto</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">ID</label>
                    <input
                    id="productId"
                    type="number"
                    placeholder="Solo para PUT , PATCH y Delete"
                    class="w-full rounded-xl border border-slate-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400"
                    >
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Titulo</label>
                    <input
                    id="title"
                    type="text"
                    placeholder="Nombre del producto"
                    class="w-full rounded-xl border border-slate-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400"
                    >
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Precio</label>
                    <input
                    id="price"
                    type="number"
                    placeholder="Ej: 99.99"
                    class="w-full rounded-xl border border-slate-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400"
                    >
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Categoría</label>
                    <input
                    id="category"
                    type="text"
                    placeholder="Ej: electronics"
                    class="w-full rounded-xl border border-slate-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400"
                    >
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Descripcion</label>
                    <textarea
                    id="description"
                    rows="3"
                    placeholder="Descripcion del producto"
                    class="w-full rounded-xl border border-slate-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400"
                    name="" id="">
                </textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">URL Imagen</label>
                <input
                id="image"
                type="text"
                placeholder="htts://..."
                class="w-full rounded-xl border border-slate-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400"
                >
            </div>
        </div>
        <div class="flex flex-wrap gap-3 mt-6">
            <button 
            id="btnCreate"
            class="bg-emerald-600 hover:bg-emerald-700 rounded-xl px-5 py-2 font-medium text-white"
            >POST Crear</button>
            <button
            id="btnPut"
            class="bg-emerald-600 hover:bg-emerald-700 rounded-xl px-5 py-2 font-medium text-white"
            >PUT Reemplazar</button>
            <button
            id="btnPatch"
            class="bg-emerald-600 hover:bg-emerald-700 rounded-xl px-5 py-2 font-medium text-white"
            >PATCH Actualizar</button>
            <button
            id="btnDelete"
            class="bg-rose-400 hover:bg-rose-600 rounded-xl border-slate-300 px-4 py-2 font-medium text-white"
            >DELETE Eliminar</button>
            <button
            id="btnClear"
            class="bg-slate-500 hover:bg-slate-600 rounded-xl border-slate-300 px-4 py-2 font-medium text-white"
            >Limpiar
         </button>
        </div>
    </section>
    <!-- LISTADO -->
    <section class="bg-white rounded-2xl shadow p-6">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
            <h2 class="text-xl font-semibold text-slate-800"> Productos</h2>
            <div class="flex gap-3">
                <input
                id="searchInput"
                type="text"
                placeholder="Buscar por titulo ..."
                class="rounded-xl border border-slate-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400"
                >
                <button
                id="btnLoad"
                class="bg-slate-800 hover:bg-slate-900 text-white px-5 py-2 rounded-xl font-medium"
                >
                Cargar productos
            </button>
        </div>
    </div>
    <div
    id="productsContainer"
    class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
    >
    
</div>
</section>
</div>
<script>
    // inputs
    const API_URL = "https://fakestoreapi.com/products"
    const productIdProducto = document.getElementById('productId')
    const titleInput = document.getElementById('title')
    const priceInput = document.getElementById('price')
    const categoryInput = document.getElementById('category')
    const descriptionInput = document.getElementById('description')
    const imageInput = document.getElementById('image')
    
    // BOTONES
    const btnCreate = document.getElementById('btnCreate')
    const btnPut = document.getElementById('btnPut')
    const btnPatch = document.getElementById('btnPatch')
    const btnDelete = document.getElementById('btnDelete')
    const btnClear = document.getElementById('btnClear')
    const btnLoad = document.getElementById('btnLoad')

    
    const productsContainer = document.getElementById('productsContainer')
    const searchInput = document.getElementById('searchInput')

    let allProducts = []

    function getFormData() {
        return {
            title: titleInput.value.trim(),
            price: Number(priceInput.value),
            description : descriptionInput.value.trim(),
            image : imageInput.value.trim(),
            category : categoryInput.value.trim()
        }
    }
    function clearForm() {
        productIdProducto.value = ""
        titleInput.value = ""
        priceInput.value = ""
        descriptionInput.value = ""
        imageInput.value = ""
        categoryInput.value = ""
    }

    //todo  validar
    //cargar productos
    function renderProducts(products) {
        productsContainer.innerHTML = ""
        
        if (products.length===0) {
            productsContainer.innerHTML = `
            <p>No se encontraron productos</p>
                    `
                    return
                }
                products.forEach(producto => {
                    const card = document.createElement('article')
                    card.className = "bg-slate-50 rounded-2xl border border-slate-200 p-4 shadow-sm hover:shadow-lg transition"
                    card.innerHTML = `
                        <img 
                            src="${producto.image}"
                            alt="${producto.title}"
                            class = "w-full h-48 object-contain rounded-xl bg-white p-4"
                            />

                    <div class="mt-4">
                        <h3 class="font-semibold text-slate-800 line-clamp-2 min-h-[48px]">${producto.title}</h3>
                        <p class="text-sm text-slate-500 mt-1">${producto.category}</p>
                        <p class="text-lg font-bold text-sky-700 mt-2">${producto.price}</p>

                        <div class="flex gap-2 mt-4">
                            <button
                            class = "flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl text-sm"
                            data-action="edit"
                            data-id="${producto.id}"
                            >Cargar</button>
                            <button
                            class = "flex-1 bg-rose-600 hover:bg-rose-700  text-white py-2 rounded-xl text-sm"
                            data-action="remove"
                            data-id="${producto.id}"
                            >Elminar</button>
                        </div>
                    </div>
                            `
            productsContainer.appendChild(card)
        });
    }
    async function loadProducts() {
        try {
            const response = await fetch(API_URL)
            const data = await response.json()
            console.log(data)
            renderProducts(data)
        } catch (error) {
            console.log(error)
        }
    }
    
    async function createProduct() {
        console.log('createProduct');
        
        try {
            const payload = getFormData()
            const response = await fetch(API_URL,{
                method: 'POST',
                headers:{
                    "Content-Type":"application/json"
                },
                body: JSON.stringify(payload)
            })
            const data = await response.json()

            
        } catch (error) {
            
        }
    }
    
    async function replaceProduct() {
        console.log('replaceProduct');
        const id = validateId()
        if(!id) return
        
        try {
            const payload = getFormData()
            const response = await fetch(`${API_URL}/${id}`,{
                    method:"PUT",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body: JSON.stringify(payload)
                })
                const data = await response.json()
            
            } catch (error) {
            
            }
            
        }
     async function updateProductPartially() {
         console.log('updateProductPartially');
         const id = validateId()
         if (!id) return
        try {
            const payload = {}
            if (titleInput.value.trim()) payload.title = titleInput.value.trim()
            if (priceInput.value) payload.price = Number(priceInput.value)
            if (descriptionInput.value.trim()) payload.description = descriptionInput.value.trim()
            if (imageInput.value.trim()) payload.image = imageInput.value.trim()
            if (categoryInput.value.trim()) payload.category = categoryInput.value.trim()

            const response = await fetch(`${API_URL}/${id}`,{
                method: "PATCH",
                headers:{
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            })
            
            const data = await response.json()
            
        } catch (error) {
            
        }
     }
     
     async function deleteProduct(idFromButton = null) {
         console.log('deleteProduct');
            const id = idFromButton || validateId()
            if(!id) return
            try {
                const response = await fetch(`${API_URL}/${id}`,{
                    method : "DELETE"
                })
                const data = await response.json()
            } catch (error) {
                
            }
     }
    async function validateId(params) {
      
    }

    //Eventos de botones principales
    btnLoad.addEventListener('click', loadProducts)
    btnCreate.addEventListener('click', createProduct)
    btnPut.addEventListener('click', replaceProduct)
    btnPatch.addEventListener('click', updateProductPartially)
    btnDelete.addEventListener('click', ()=> deleteProduct())
    btnClear.addEventListener('click', clearForm)
    
    //cargaInicial
    loadProducts()
    
    
    
</script>
</body>
</html>
